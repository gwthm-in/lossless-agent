site_name: lossless-agent
site_description: Lossless context management for AI agents
site_url: https://gwthm-in.github.io/lossless-agent/
repo_url: https://github.com/gwthm-in/lossless-agent
repo_name: gwthm-in/lossless-agent

docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Adapters: adapters.md
  - API Reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
